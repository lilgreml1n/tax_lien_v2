services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: lienhunter
      MYSQL_USER: lienuser
      MYSQL_PASSWORD: lienpass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: "mysql+pymysql://lienuser:lienpass@db:3306/lienhunter"
      OLLAMA_URL: "http://host.docker.internal:11434"
      DGX_URL: "http://192.168.100.133:11434"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - ./INSTRUCTIONS.md:/INSTRUCTIONS.md:ro
      - ./README.md:/README.md:ro
      - ./GETTING_STARTED.md:/GETTING_STARTED.md:ro
      - ./docs:/app/docs:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
